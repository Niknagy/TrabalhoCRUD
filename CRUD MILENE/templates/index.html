<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema CRUD de Tarefas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            margin-bottom: 30px;
            color: #4a4a4a;
            font-size: 2.5em;
        }
        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .menu-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #007bff;
            display: block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .menu-item:hover {
            background: #007bff;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .menu-item h3 {
            margin: 0;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema CRUD de Tarefas</h1>
        <div class="menu">
            <a href="/insert" target="_blank" class="menu-item">
                <h3>Inserir Tarefa</h3>
            </a>
            <a href="/list" target="_blank" class="menu-item">
                <h3>Consultar Tarefas</h3>
            </a>
            <a href="/list" target="_blank" class="menu-item">
                <h3>Atualizar Tarefa</h3>
                <small>(selecione na lista)</small>
            </a>
            <a href="/list" target="_blank" class="menu-item">
                <h3>Excluir Tarefa</h3>
                <small>(selecione na lista)</small>
            </a>
        </div>
    </div>
</body>
</html>
